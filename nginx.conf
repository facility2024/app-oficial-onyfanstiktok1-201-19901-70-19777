events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 3000;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Configuração para SPA (Single Page Application)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache para assets estáticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Configurações de segurança
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(self), payment=(self), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

        # Content Security Policy — cobre Supabase, Bunny CDN, Asaas, Google Maps, NeonPay
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.googleapis.com https://maps.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.b-cdn.net https://iframe.mediadelivery.net https://video.bunnycdn.com https://storage.bunnycdn.com https://api.asaas.com https://sandbox.asaas.com https://www.asaas.com https://api.neonpay.com.br https://maps.googleapis.com https://maps.gstatic.com https://nominatim.openstreetmap.org; frame-src 'self' https://iframe.mediadelivery.net https://www.asaas.com https://sandbox.asaas.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self';" always;
    }
}